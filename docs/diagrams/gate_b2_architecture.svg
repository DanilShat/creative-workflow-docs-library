<svg xmlns="http://www.w3.org/2000/svg" width="980" height="300" viewBox="0 0 980 300" role="img" aria-labelledby="title desc">
  <title id="title">Gate B2 Photoshop gateway architecture</title>
  <desc id="desc">Photoshop UXP panel sends chat to a localhost gateway, which routes to Ollama or Claude and returns typed allowlisted actions.</desc>
  <style>.bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:8}.ps{fill:#eef2ff;stroke:#4f46e5}.llm{fill:#f0fdf4;stroke:#16a34a}.text{font:600 16px Arial, sans-serif;fill:#0f172a}.small{font:13px Arial, sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:2;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <rect class="bg" width="980" height="300"/>
  <rect class="box ps" x="50" y="95" width="180" height="90"/>
  <text class="text" x="89" y="135">Photoshop</text><text class="small" x="82" y="157">UXP chat panel</text>
  <rect class="box" x="310" y="95" width="190" height="90"/>
  <text class="text" x="350" y="135">Agent Gateway</text><text class="small" x="350" y="157">localhost:8765</text>
  <rect class="box llm" x="590" y="45" width="160" height="75"/>
  <text class="text" x="645" y="87">Ollama</text>
  <rect class="box llm" x="590" y="165" width="160" height="75"/>
  <text class="text" x="644" y="207">Claude</text>
  <rect class="box ps" x="820" y="95" width="120" height="90"/>
  <text class="text" x="850" y="135">Action</text><text class="small" x="837" y="157">typed allowlist</text>
  <line class="arrow" x1="230" y1="140" x2="310" y2="140"/>
  <line class="arrow" x1="500" y1="125" x2="590" y2="83"/>
  <line class="arrow" x1="500" y1="155" x2="590" y2="203"/>
  <line class="arrow" x1="750" y1="140" x2="820" y2="140"/>
</svg>
